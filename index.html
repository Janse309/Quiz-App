<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>

    <link rel="stylesheet" href="./style.css">
    <script src="./scripts/db.js" defer></script>
    <script src="./scripts/template.js" defer></script>
    <script src="./script.js"></script>


    <!-- bootstrap file -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body onload="init()">

    <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">QuizApp</span>
        </div>
    </nav>

    <section class="container">
        <div class="card quiz-card">
            <img src="./img/Group 5.png" class="card-img-top" alt="Quiz app picture">

            <div id="finish" class="card-body d_none">

                Quiz Beendet
            </div>

            <div id="endscreen" class="card-body">

                <h3 id="questiontext" class="mb-3">Frage:</h3>

                <div class="card quiz-answer-card mb-3" onclick="answer('answer_1')">
                    <div id="answer_1" class="card-body">
                        Antwort 1
                    </div>
                </div>

                <div class="card quiz-answer-card mb-3" onclick="answer('answer_2')">
                    <div id="answer_2" class="card-body">
                        Antwort 2
                    </div>
                </div>

                <div class="card quiz-answer-card mb-3" onclick="answer('answer_3')">
                    <div id="answer_3" class="card-body">
                        Antwort 3
                    </div>
                </div>

                <div class="card quiz-answer-card mb-3" onclick="answer('answer_4')">
                    <div id="answer_4" class="card-body">
                        Antwort 4
                    </div>
                </div>

                <div class="question-footer mb-3">
                    <button class="btn"><img src="./img/arrow_back_ios_new_24dp_434343_FILL1_wght0_GRAD0_opsz24.svg" alt="arrow left"></button>
                    <span> 
                     <b id="question-number">1</b> von <b id="all-questions">7</b> Fragen
                    </span>
                    <button onclick="nextQuestion()" disabled id="next-button" class="btn"><img src="./img/arrow_forward_ios_24dp_434343_FILL1_wght0_GRAD0_opsz24.svg" alt="arrow right"></button>
                </div>

            </div>
        </div>
    </section>

</body>

</html>
